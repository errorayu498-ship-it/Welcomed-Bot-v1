<!DOCTYPE html>
<html>
<head>
<title>Welcome Bot Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Welcome Card Dashboard</h1>

<form method="POST">

<label>Welcome Channel ID</label>
<input type="text" name="channel" value="{{config.welcome_channel}}">

<label>Title</label>
<input type="text" name="title" value="{{config.title}}">

<label>Subtitle</label>
<input type="text" name="subtitle" value="{{config.subtitle}}">

<label>Background</label>
<select name="background">
<option value="banner">User Banner</option>
<option value="gradient">Gradient</option>
</select>

<label>Text Color</label>
<input type="text" name="color" value="{{config.text_color}}">

<button type="submit">Save</button>

</form>

</body>
</html>
